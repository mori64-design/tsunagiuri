<body>

<script>
    // [省略：既存のholidays, fetchJapaneseHolidays, getSettlementDate, getDaysDiff, calculateMatsuiFee ロジックをここに配置]
    // ※元のコード通りに配置してください
    // 通信エラー等に備える内蔵バックアップ（2026年〜2027年）
    let holidays = new Set([
    "2026-01-01", "2026-01-12", "2026-02-11", "2026-02-23", "2026-03-20",
    "2026-04-29", "2026-05-03", "2026-05-04", "2026-05-05", "2026-05-06",
    "2026-07-20", "2026-08-11", "2026-09-21", "2026-09-22", "2026-09-23",

    "2027-01-01", "2027-01-11", "2027-02-11", "2027-02-23", "2027-03-21", "2027-03-22",
    "2027-04-29", "2027-05-03", "2027-05-04", "2027-05-05", "2027-05-06",
    "2027-07-19", "2027-08-11", "2027-09-20", "2027-09-23", "2027-10-11", "2027-11-03", "2027-11-23"
    ]);

    // CORS制限を回避できる、日本の祝日オープンAPI（JSON形式）を使用
    async function fetchJapaneseHolidays() {
        const statusBadge = document.getElementById('holidayStatus');
        try {
        // CORSパブリック許可されている信頼性の高い祝日API（現行年と翌年の2年分を動的カバー）
        const currentYear = new Date().getFullYear();
        const years = [currentYear, currentYear + 1];
        let fetchedCount = 0;

        for (const year of years) {
            const url = `https://date.nager.at/api/v3/PublicHolidays/${year}/JP`;
            const response = await fetch(url);
            if (!response.ok) continue;
            
            const data = await response.json();
            if (data && data.length > 0) {
                if (fetchedCount === 0) holidays.clear(); // 最初のデータが来たらハードコードをクリア
                data.forEach(holiday => {
                    holidays.add(holiday.date); // holiday.dateは "YYYY-MM-DD" 形式
                });
                fetchedCount++;
            }
        }

        if (fetchedCount > 0) {
            statusBadge.innerText = `● 祝日データ自動更新完了 (取得数: ${holidays.size}日)`;
            statusBadge.className = "status-badge status-success";
        } else {
            throw new Error('No data received');
        }
    } catch (e) {
        console.error("祝日データの取得に失敗しました。内蔵データを適用します:", e);
        statusBadge.innerText = "● 外部祝日取得エラー（内蔵バックアップで動作中）";
        statusBadge.className = "status-badge status-fallback";
    }
    // 祝日データセット完了後に全計算を実行
    calculateAll();
}

function getSettlementDate(dateString) {
    let date = new Date(dateString);
    if (isNaN(date.getTime())) return null;
    let businessDaysAdded = 0;
    while (businessDaysAdded < 2) {
        date.setDate(date.getDate() + 1);
        let dayOfWeek = date.getDay();
        let formattedDate = date.toISOString().split('T')[0];
        if (dayOfWeek !== 0 && dayOfWeek !== 6 && !holidays.has(formattedDate)) {
            businessDaysAdded++;
        }
    }
    const dayNames = ['日', '月', '火', '水', '木', '金', '土'];
    return `${date.getFullYear()}/${String(date.getMonth() + 1).padStart(2, '0')}/${String(date.getDate()).padStart(2, '0')} (${dayNames[date.getDay()]})`;
}

function getDaysDiff(d1Str, d2Str) {
    let bSettlement = getSettlementDate(d1Str);
    let sSettlement = getSettlementDate(d2Str);
    if (!bSettlement || !sSettlement) return 0;
    let d1 = new Date(bSettlement.substring(0, 10).replace(/\//g, '-'));
    let d2 = new Date(sSettlement.substring(0, 10).replace(/\//g, '-'));
    let diffTime = d2 - d1;
    let diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
    return diffDays >= 0 ? diffDays + 1 : 0;
}

function calculateMatsuiFee(oneWayFunds) {
    let totalVolume = oneWayFunds * 2; 
    if (totalVolume <= 500000) {
        return 0;
    } else if (totalVolume <= 1000000) {
        return 1100;
    } else if (totalVolume <= 100000000) {
        let overAmount = totalVolume - 1000000;
        let additionalSteps = Math.ceil(overAmount / 1000000);
        return 1100 + (additionalSteps * 1100);
    } else {
        return 110000;
    }
}

                    ${res.total.toLocaleString()}円
                    <span class="tooltiptext">
                        <strong>内訳:</strong> ${res.fee.toLocaleString()}円(手数料) + ${res.loanCost.toLocaleString()}円(金利)<br>
                        <strong>期間:</strong> ${document.getElementById('loanDays').innerText}日
                    </span>
                </td>
                <td class="center">${(res.total === minTotal && res.total > 0) ? "★最安" : ""}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function toggleMaster() {
        let m = document.getElementById('master-section');
        m.style.display = (m.style.display === 'block') ? 'none' : 'block';
    }
    
    // 初期起動
    fetchJapaneseHolidays();
</script>
