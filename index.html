<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>つなぎ売りコスト比較</title>
    <style>
        :root { --primary-color: #1F497D; --bg-color: #f5f7fa; --card-bg: #fff; --input-bg: #FFF2CC; --calc-bg: #F2F2F2; --border-color: #D9D9D9; }
        body { font-family: sans-serif; background-color: var(--bg-color); padding: 20px; }
        .container { max-width: 680px; margin: 0 auto; background: var(--card-bg); padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .input-cell { background-color: var(--input-bg); border: 1px solid var(--border-color); padding: 8px; }
        .calc-cell { background-color: var(--calc-bg); border: 1px solid var(--border-color); padding: 8px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        th, td { border: 1px solid var(--border-color); padding: 8px; text-align: right; }
        th { background-color: var(--primary-color); color: white; text-align: center; }
        #master-section { display: none; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>つなぎ売りコスト比較シミュレーター</h1>
    <div class="input-group">
        <div class="input-cell"><label>株価</label><input type="number" id="stockPrice" value="0" oninput="calculateAll()"></div>
        <div class="input-cell"><label>株数</label><input type="number" id="stockVolume" value="100" oninput="calculateAll()"></div>
        <div class="input-cell"><label>購入日</label><input type="date" id="buyDate" onchange="calculateAll()"></div>
        <div class="input-cell"><label>売却日</label><input type="date" id="sellDate" onchange="calculateAll()"></div>
    </div>
    <div class="calc-cell">必要資金: <span id="requiredFunds">0</span> 円 / 貸株日数: <span id="loanDays">0</span> 日</div>

    <table id="resultTable">
        <thead><tr><th>証券会社</th><th>手数料</th><th>金利</th><th>合計</th></tr></thead>
        <tbody></tbody>
    </table>

    <div style="cursor:pointer; color:blue; margin-top:20px;" onclick="document.getElementById('master-section').style.display='block'">⚙️ マスタを表示</div>
    <div id="master-section">
        <table class="master-table">
            <thead><tr><th>証券会社</th><th>金利(%)</th><th>手数料(円)</th></tr></thead>
            <tbody>
                <tr><td>楽天証券</td><td><input type="number" class="rate" value="1.1" oninput="calculateAll()"></td><td><input type="number" class="fee" value="0" oninput="calculateAll()"></td></tr>
                <tr><td>SBI証券</td><td><input type="number" class="rate" value="1.1" oninput="calculateAll()"></td><td><input type="number" class="fee" value="0" oninput="calculateAll()"></td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
function calculateAll() {
    const price = parseFloat(document.getElementById('stockPrice').value) || 0;
    const vol = parseFloat(document.getElementById('stockVolume').value) || 0;
    const funds = price * vol;
    document.getElementById('requiredFunds').innerText = funds.toLocaleString();

    const d1 = new Date(document.getElementById('buyDate').value);
    const d2 = new Date(document.getElementById('sellDate').value);
    const days = Math.max(0, Math.ceil((d2 - d1) / (1000 * 60 * 60 * 24)));
    document.getElementById('loanDays').innerText = days;

    const tbody = document.querySelector('#resultTable tbody');
    tbody.innerHTML = "";

    document.querySelectorAll('#master-section tbody tr').forEach(row => {
        const name = row.cells[0].innerText;
        const rate = parseFloat(row.querySelector('.rate').value) || 0;
        const fee = parseFloat(row.querySelector('.fee').value) || 0;
        
        const interest = Math.floor(funds * (rate / 100) * days / 365);
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${name}</td><td>${fee}</td><td>${interest}</td><td>${fee + interest}</td>`;
        tbody.appendChild(tr);
    });
}
</script>
</body>
</html>
