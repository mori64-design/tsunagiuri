<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>つなぎ売りコスト比較</title>
    <style>
        body { font-family: sans-serif; background-color: #f5f7fa; padding: 20px; }
        .container { max-width: 650px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .input-cell { background-color: #FFF2CC; border: 1px solid #D9D9D9; padding: 8px; border-radius: 4px; }
        .calc-cell { background-color: #F2F2F2; padding: 8px; font-weight: bold; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        th { background-color: #1F497D; color: white; padding: 8px; text-align: center; }
        td { border: 1px solid #D9D9D9; padding: 8px; text-align: right; }
        #master-section { display: none; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>つなぎ売りコスト一括比較シミュレーター</h1>
    <div id="holidayStatus" style="font-size: 10px; margin-bottom: 10px;">初期化中...</div>

    <div class="input-group">
        <div class="input-cell"><label>株価</label><input type="number" id="stockPrice" value="5000" oninput="calculateAll()"></div>
        <div class="input-cell"><label>株数</label><input type="number" id="stockVolume" value="100" oninput="calculateAll()"></div>
        <div class="input-cell"><label>購入日</label><input type="date" id="buyDate" onchange="calculateAll()"></div>
        <div class="input-cell"><label>売却日</label><input type="date" id="sellDate" onchange="calculateAll()"></div>
    </div>
    <div class="calc-cell">必要資金: <span id="requiredFunds">0</span> 円 / 貸株日数: <span id="loanDays">0</span> 日</div>

    <table id="resultTable">
        <thead><tr><th>証券会社</th><th>手数料</th><th>金利</th><th>合計</th><th>判定</th></tr></thead>
        <tbody></tbody>
    </table>

    <div onclick="toggleMaster()" style="cursor:pointer; color:#1F497D; font-weight:bold; margin-top:20px; text-align:center;">⚙️ マスタ設定</div>
    <div id="master-section">
        </div>
</div>

<script>
// 1. 祝日データ（必要最小限をここに定義して即座に動かす）
let holidays = new Set(["2026-07-20", "2026-08-11", "2026-09-21"]);

// 2. ページ読み込み時に即座に計算を開始
window.onload = function() {
    // 日付の初期値を今日にする
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('buyDate').value = today;
    calculateAll();
    fetchHolidays();
};

function calculateAll() {
    // 資金計算
    const price = parseFloat(document.getElementById('stockPrice').value) || 0;
    const vol = parseFloat(document.getElementById('stockVolume').value) || 0;
    document.getElementById('requiredFunds').innerText = (price * vol).toLocaleString();

    // 日数計算
    const d1 = new Date(document.getElementById('buyDate').value);
    const d2 = new Date(document.getElementById('sellDate').value);
    const days = Math.max(0, Math.ceil((d2 - d1) / (86400000)) + 1);
    document.getElementById('loanDays').innerText = isNaN(days) ? 0 : days;

    // テーブル生成 (簡易版)
    const tbody = document.querySelector('#resultTable tbody');
    tbody.innerHTML = "<tr><td>楽天証券</td><td>0</td><td>100</td><td>100</td><td>★最安</td></tr>";
}

function fetchHolidays() {
    // APIはバックグラウンドで呼ぶだけに留める
    fetch('https://date.nager.at/api/v3/PublicHolidays/2026/JP')
    .then(r => r.json())
    .then(data => {
        data.forEach(h => holidays.add(h.date));
        document.getElementById('holidayStatus').innerText = "● 祝日データ更新完了";
    })
    .catch(() => {
        document.getElementById('holidayStatus').innerText = "● 祝日データは内蔵のものを使用します";
    });
}

function toggleMaster() {
    const m = document.getElementById('master-section');
    m.style.display = (m.style.display === 'block') ? 'none' : 'block';
}
</script>
</body>
</html>
